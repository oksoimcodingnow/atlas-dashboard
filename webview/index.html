<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ATLAS</title>
<style>
  :root {
    --cyan: #00e5ff;
    --cyan-dim: #007a8a;
    --bg: #04070d;
    --bg-2: #0a1320;
    --text: #d6f6ff;
    --warn: #ff9d3d;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg) 70%);
    color: var(--text);
    font-family: "Segoe UI", "Consolas", monospace;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(0,229,255,0.03) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(90deg, rgba(0,229,255,0.03) 0 1px, transparent 1px 4px);
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 24px 36px;
    gap: 16px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,229,255,0.2);
    padding-bottom: 10px;
  }
  .brand {
    font-size: 1.4rem;
    letter-spacing: 0.4em;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(0,229,255,0.6);
  }
  .status {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--cyan-dim);
  }
  .status .dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--cyan); border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan);
    margin-right: 6px;
    animation: pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  /* Center */
  .center {
    display: grid;
    grid-template-columns: 1fr 1.4fr 1fr;
    gap: 18px;
    align-items: stretch;
  }

  .panel {
    border: 1px solid rgba(0,229,255,0.25);
    background: rgba(0, 30, 50, 0.18);
    padding: 18px;
    position: relative;
    backdrop-filter: blur(4px);
  }
  .panel::before, .panel::after {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    border: 1px solid var(--cyan);
  }
  .panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .panel::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .panel h3 {
    margin: 0 0 12px;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--cyan);
    border-bottom: 1px dashed rgba(0,229,255,0.3);
    padding-bottom: 6px;
  }

  /* Core (the big greeting circle) */
  .core {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .ring {
    width: 230px; height: 230px;
    border-radius: 50%;
    border: 2px solid rgba(0,229,255,0.4);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0,229,255,0.15), inset 0 0 30px rgba(0,229,255,0.15);
  }
  .ring::before {
    content: "";
    position: absolute; inset: -10px;
    border: 1px dashed rgba(0,229,255,0.3);
    border-radius: 50%;
    animation: spin 18s linear infinite;
  }
  .ring::after {
    content: "";
    position: absolute; inset: 12px;
    border-radius: 50%;
    border-top: 2px solid var(--cyan);
    border-right: 2px solid transparent;
    border-bottom: 2px solid transparent;
    border-left: 2px solid transparent;
    animation: spin 3s linear infinite reverse;
  }
  @keyframes spin {
    from { transform: rotate(0); }
    to   { transform: rotate(360deg); }
  }
  .greet {
    font-size: 1.6rem;
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0,229,255,0.6);
  }
  .sub {
    font-size: 0.85rem;
    color: var(--text);
    opacity: 0.7;
    margin-top: 6px;
  }
  .prompt {
    margin-top: 10px;
    font-size: 1rem;
    color: var(--text);
  }
  .prompt span { color: var(--cyan); }

  /* Quick actions */
  .actions {
    display: grid;
    gap: 10px;
  }
  button.action {
    background: transparent;
    border: 1px solid rgba(0,229,255,0.4);
    color: var(--text);
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    transition: 0.18s ease;
    position: relative;
  }
  button.action:hover {
    background: rgba(0,229,255,0.1);
    border-color: var(--cyan);
    box-shadow: 0 0 14px rgba(0,229,255,0.25);
    color: var(--cyan);
  }
  button.action .k {
    color: var(--cyan-dim);
    font-size: 0.7rem;
    float: right;
  }

  /* Status panel */
  .stats { display: grid; gap: 10px; font-size: 0.85rem; }
  .stats .row { display: flex; justify-content: space-between; }
  .stats .row span:last-child { color: var(--cyan); }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--cyan-dim);
    letter-spacing: 0.2em;
    border-top: 1px solid rgba(0,229,255,0.2);
    padding-top: 8px;
  }

  .blink { animation: blink 1.2s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="stage">
    <div class="header">
      <div class="brand">A · T · L · A · S</div>
      <div class="status"><span class="dot"></span>SYSTEM ONLINE</div>
    </div>

    <div class="center">
      <!-- LEFT: Status -->
      <div class="panel">
        <h3>STATUS</h3>
        <div class="stats">
          <div class="row"><span>SESSION</span><span id="session">--</span></div>
          <div class="row"><span>DATE</span><span id="date">--</span></div>
          <div class="row"><span>TIME</span><span id="time">--:--:--</span></div>
          <div class="row"><span>SPRINT</span><span>DAY 1 / 3</span></div>
          <div class="row"><span>LOCATION</span><span>URBAN</span></div>
          <div class="row"><span>MODE</span><span>FOCUS</span></div>
        </div>
      </div>

      <!-- CENTER: Core -->
      <div class="panel core">
        <div class="ring">
          <div>
            <div class="greet" id="greet">Good morning</div>
            <div class="sub">{{userName}}</div>
          </div>
        </div>
        <div class="prompt">What are we building today<span class="blink">_</span></div>
      </div>

      <!-- RIGHT: Actions -->
      <div class="panel">
        <h3>QUICK ACTIONS</h3>
        <div class="actions">
          <button class="action" data-cmd="openClaude">▶ Start Claude<span class="k">[1]</span></button>
          <button class="action" data-cmd="openTerminal">▶ Open Terminal<span class="k">[2]</span></button>
          <button class="action" data-vscode="workbench.action.files.newUntitledFile">▶ New File<span class="k">[3]</span></button>
          <button class="action" data-vscode="workbench.action.files.openFolder">▶ Open Folder<span class="k">[4]</span></button>
          <button class="action" data-vscode="workbench.action.quickOpen">▶ Quick Open<span class="k">[5]</span></button>
          <button class="action" data-vscode="workbench.action.gotoSymbol">▶ Go to Symbol<span class="k">[6]</span></button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div>ATLAS v0.0.2 — initialized</div>
      <div id="quote">"Sometimes you gotta run before you can walk."</div>
    </div>
  </div>

<script>
  const vscode = acquireVsCodeApi();

  function pad(n){ return String(n).padStart(2,"0"); }
  function tick() {
    const now = new Date();
    document.getElementById("time").textContent =
      pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
    document.getElementById("date").textContent =
      now.toISOString().slice(0,10);
    document.getElementById("session").textContent = "#" + (now.getTime() % 9999);

    const h = now.getHours();
    let g = "Good evening";
    if (h < 5) g = "Working late";
    else if (h < 12) g = "Good morning";
    else if (h < 18) g = "Good afternoon";
    document.getElementById("greet").textContent = g;
  }
  tick();
  setInterval(tick, 1000);

  const quotes = [
    '"He who holds the world, builds it."',
    '"Ship it, then perfect it."',
    '"The map is not the territory — write code, not docs."',
    '"Done is better than perfect."',
    '"Move fast. Break nothing important."',
    '"Atlas online. Standing by."'
  ];
  document.getElementById("quote").textContent =
    quotes[Math.floor(Math.random() * quotes.length)];

  document.querySelectorAll("button.action").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (btn.dataset.file) {
        vscode.postMessage({ command: "openFile", file: btn.dataset.file });
      } else if (btn.dataset.cmd === "openTerminal") {
        vscode.postMessage({ command: "openTerminal" });
      } else if (btn.dataset.cmd === "openClaude") {
        vscode.postMessage({ command: "openClaude" });
      } else if (btn.dataset.vscode) {
        vscode.postMessage({ command: "runCommand", id: btn.dataset.vscode });
      }
    });
  });

  document.addEventListener("keydown", (e) => {
    const map = { "1":0, "2":1, "3":2, "4":3, "5":4, "6":5 };
    if (map[e.key] !== undefined) {
      document.querySelectorAll("button.action")[map[e.key]].click();
    }
  });
</script>
</body>
</html>
